name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    name: Gnapi Shield
    uses: chetanmanjunath93/shield@0.1
    with:
      scan_dependencies: true
      scan_secrets: true
      ai_api_key: ${{ secrets.ai_api_key }}
    secrets:
      ai_api_key: ${{ secrets.AI_API_KEY }}
